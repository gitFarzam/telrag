<!-- Base Template for the Application -->
 {% load static %}

<html>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/ws.js"></script>

<head>


<style>

body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  background-color: #000000;
}

h2 {
  color: #ffffff;
}

.conversation {
  font-family: Arial, sans-serif;
  margin: 0 auto;
  padding: 20px;
  /* background-color: #f9f9f9; */
  width: 90%;
  background-color: #222222;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  height: calc(100vh - 120px); /* header + footer space */

}

.chat-input {
  display: flex;
  gap: 8px;
  padding: 10px;
  border-top: 1px solid #ddd;
  background: #2c2c2c;

}


.chat-input input[type="text"] {
  flex: 1;
  padding: 10px 12px;
  border-radius: 5px;
  border: 1px solid #ccc;
  font-size: 1.25rem;
  outline: none;
  height: 100px;
}

.chat-input input[type="text"]:focus {
  border-color: #8bcf9b;
}

.chat-input button {
  padding: 10px 16px;
  border-radius: 5px;
  border: none;
  background-color: #8bcf9b;
  color: #000;
  font-size: 1.25rem;
  cursor: pointer;
}

.chat-input button:hover {
  background-color: #7bbf8a;
}


.chat-container {
  display: flex;
  flex-direction: column;
  width: 100%;
  flex: 1;
  overflow-y: auto;
  padding: 10px;


}

.message {
  max-width: 70%;
  margin: 8px;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background-color: #ffffff;
  word-wrap: break-word;
  display: flex;
  flex-direction: column;
  /* font-size: 1.25rem;  */
  /* font-family: monospace; */
}

/* STAFF → LEFT */
.message.agent {
  align-self: flex-start;
  background-color: #e3ffe4;
}

/* USER → RIGHT */
.message.user {
  align-self: flex-end;
  background-color: #f5f5f5;
  text-align: right;
}

/* .message strong {
  font-size: 0.8rem;
  opacity: 0.7;
  margin-bottom: 4px;
} */









</style>










    <title>{% block title %}TelRAG{% endblock %}</title>
</head>
<body>
    <header>
        <h1>TelRAG</h1>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy; 2024 My Application</p>
    </footer>
</body>
</html>
