{% extends "base.html" %}
{% block title %}Chat Detail{% endblock %}

{% block content %}

<div class="conversation" id="conversation" hx-ext="ws" ws-connect="/ws/chat/{{ conversation.id }}/">

  <h2>Conversation Name</h2>

  <!-- SCROLLABLE MESSAGES -->
  <div id="messages" 
       class="chat-container">

    {% for message in messages %}
      {% include "message.html" %}
    {% endfor %}

  </div>

  <!-- FIXED INPUT -->
  <form
    class="chat-input"
    hx-post="{% url 'chat-send' conversation.pk %}"
    hx-on="htmx:afterRequest: this.reset()"
  >
    {% csrf_token %}
    <input
      type="text"
      name="content"
      required
      autocomplete="off"
      placeholder="Type your message..."
    />

     <input type="checkbox" name="is_agent" value="true" style="width: 40px;">🤖<br>

    <button type="submit">Send</button>
  </form>

</div>

{% endblock %}
