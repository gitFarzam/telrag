{% extends "base.html" %}

{% block title %}Chat Detail{% endblock %}

{% block content %}

<div class="conversation" id="conversation" hx-ext="ws" ws-connect="/ws/chat/{{ conversation.id }}/" >

  <h2>Chat with {{user.first_name}}</h2>

  <!-- SCROLLABLE MESSAGES -->
  <div id="messages" 
       class="chat-container">
    {% for message in messages %}
      {% include "message.html" %}
    {% endfor %}

  </div>

  <!-- FIXED INPUT -->
  <form
    class="chat-input"
    hx-post="{% url 'chat-send' conversation.pk %}"
    hx-on="htmx:afterRequest: this.reset()"
  >
    {% csrf_token %}
    <input
      type="text"
      name="content"
      required
      autocomplete="off"
      placeholder="Type your message..."
    />

    <button type="submit">Send</button>
  </form>

<script>
document.body.addEventListener('htmx:wsAfterMessage', function() {
  setTimeout(function() {
    var el = document.getElementById('messages');
    if (el) {
      el.scrollTo({
        top: el.scrollHeight,
        behavior: 'smooth'
      });
    }
  }, 0);
});
</script>


</div>

{% endblock %}
