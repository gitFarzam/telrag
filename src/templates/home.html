<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Chat</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            margin: 0 0 30px 0;
            font-size: 22px;
            font-weight: 600;
            color: #222;
        }

        input {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            transition: border 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 10px;
            border: none;
            background: #4a90e2;
            color: white;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.05s ease;
        }

        button:hover {
            background: #3b7dc4;
        }

        button:active {
            transform: scale(0.98);
        }

        @media (max-width: 400px) {
            .card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Please write your name</h1>

    <form method="post" action="{% url 'new-conversation' %}">
        {% csrf_token %}
        <input 
            type="text" 
            name="name" 
            placeholder="Enter your name"
            required
        >
        <button type="submit">Start Chat</button>
    </form>
</div>

</body>
</html>
