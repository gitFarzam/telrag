{% extends "base.html" %}
{% block title %}Start Chat{% endblock %}
{% block content %}
  <div class="home-view">
    <div class="home-card">
      <h1>Please write your name</h1>
      <form method="post" action="{% url 'new-conversation' %}">
        {% csrf_token %}
        <input
          type="text"
          name="name"
          placeholder="Enter your name"
          required
        />
        <button type="submit">Start Chat</button>
      </form>
    </div>
  </div>
{% endblock %}
