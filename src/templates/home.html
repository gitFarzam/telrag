<div id="start" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">

 <!-- create a new conversation  -->
  <form method="post" action="{% url 'new-conversation' %}">
    <input type="text" name="name" style="width: 400px; font-size: 45px;" placeholder="Your name.."><br>
    {% csrf_token %}
    <button type="submit" style="width: 400px; font-size: 65px;">
      Start Chat
    </button>
  </form>


</div>
