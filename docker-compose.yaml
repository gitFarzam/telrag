services:

  db:
    image: pgvector/pgvector:pg16
    container_name: telrag_pgvector
    restart: always
    volumes:
      - telrag-pgvector-volume:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5435:5432"

  redis:
    image: redis:7
    container_name: telrag_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    # the dir which DockerFile is located
    build: .
    container_name: telrag_app
    working_dir: /app
    restart: always
    command: daphne -p 8006 django_project.asgi:application --chdir src
    volumes:
    # optional: mounting project to container, so if you need to modify codes no longer is required shut down the container, you can just edit the files in the local host machine and changes will be applied to the container.
      - ./:/app 
    depends_on:
      - db
      - redis
    env_file:
      - .env
    expose:
      - "8006"


  celery:
  # the same dir for the app, as celery uses the app for running and installed inside the django app
    build: .
    container_name: telrag_celery
    working_dir: /app
    command: celery -A config worker -l info --chdir src
    depends_on:
      - redis
      - db


volumes:
  telrag-pgvector-volume: